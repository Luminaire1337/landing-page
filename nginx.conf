server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    server_tokens off;

    add_header X-Content-Type-Options    "nosniff"                          always;
    add_header X-Frame-Options           "DENY"                             always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"  always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=(), payment=()" always;
    add_header Content-Security-Policy   "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self'; connect-src 'self' https://api.github.com; img-src 'self' data:; object-src 'none'; base-uri 'self'" always;

    gzip on;
    gzip_vary on;
    gzip_types text/html text/css application/javascript application/json image/svg+xml font/woff2;
    gzip_min_length 1024;

    # hashed _nuxt/ and _fonts/ assets — cache forever
    location /_nuxt/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location /_fonts/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # html — never cache
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-store";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
